name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev automake openjdk-17-jdk

      - name: Show versions
        run: |
          python --version
          pip --version
          java -version

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip<24.1"
          python -m pip uninstall -y sh python-for-android Cython buildozer || true
          python -m pip install "sh<2.0" "Cython<3" "buildozer==1.5.0"

      - name: Clean build cache
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf ~/.buildozer

      - name: Build APK
        run: |
          buildozer android debug
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
